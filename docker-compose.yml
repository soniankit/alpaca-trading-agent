
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: trading_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  service:
    image: ghcr.io/soniankit/trading-agent-service:latest
    command: sh -c "npx prisma generate && npx prisma db push && npm run seed && npm start"
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/trading_agent?schema=public
      - FMP_API_KEY=${FMP_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ALLOWED_ORIGINS=*
      - DASHBOARD_URL=http://34.24.150.181
    depends_on:
      db:
        condition: service_healthy

  web-client:
    image: ghcr.io/soniankit/trading-agent-web-client:latest
    environment:
      - NEXT_PUBLIC_API_URL=/api
    restart: always
    depends_on:
      - service

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-client
      - service

volumes:
  postgres_data:
