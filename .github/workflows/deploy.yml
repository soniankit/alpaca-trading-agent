name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  repository_dispatch:
    types: [trigger-deploy]
  workflow_dispatch: # Allows manual trigger

env:
  REGISTRY: ghcr.io
  SERVICE_IMAGE_NAME: ${{ github.repository_owner }}/trading-agent-service
  WEB_CLIENT_IMAGE_NAME: ${{ github.repository_owner }}/trading-agent-web-client

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Debounce Cooldown
        run: |
          echo "Debouncing deployment for 5 minutes to batch multiple repository updates..."
          sleep 300

      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Checkout Service repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/trading-agent-service
          path: trading-agent-service
          token: ${{ secrets.GHCR_PAT }}

      - name: Checkout Web Client repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/trading-agent-web-client
          path: trading-agent-web-client
          token: ${{ secrets.GHCR_PAT }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./trading-agent-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.SERVICE_IMAGE_NAME }}:latest

      - name: Build and push Web Client Image
        uses: docker/build-push-action@v5
        with:
          context: ./trading-agent-web-client
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.WEB_CLIENT_IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=/api

  deploy-to-gcp:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout infra repo for docker-compose
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "docker-compose.yml,nginx.conf"
          target: "~/app"

      - name: SSH into GCP VM and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd ~/app
            
            # Create .env file with global shared secrets (Alpaca keys are per-agent in DB)
            echo "FMP_API_KEY=${{ secrets.FMP_API_KEY }}" > .env
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
            echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
            
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Check connectivity to GHCR
            echo "Testing connectivity to ghcr.io..."
            curl -s -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" https://ghcr.io/v2/ || echo "WARN: ghcr.io not reachable directly"
            
            # Pull with retry (5 attempts, 60s delay, serial pull)
            # We pull individually to avoid concurrent connection stress on slow networks
            for i in 1 2 3 4 5; do
              echo "Pull attempt $i..."
              if docker pull ghcr.io/soniankit/trading-agent-service:latest && \
                 docker pull ghcr.io/soniankit/trading-agent-web-client:latest && \
                 docker pull nginx:alpine; then
                echo "Pull succeeded on attempt $i"
                break
              fi
              if [ "$i" -eq 5 ]; then
                echo "Pull failed after 5 attempts"
                exit 1
              fi
              echo "Pull failed, retrying in 60s..."
              sleep 60
            done
            
            # Ensure db is running first (no recreate needed)
            docker compose up -d db
            
            # Recreate only app containers (not the database)
            docker compose up -d --no-deps --force-recreate service web-client nginx
            
            # Cleanup
            docker image prune -f
            
            # Diagnostic: Check logs after deployment
          docker compose ps
          echo "--- SERVICE LOGS ---"
          docker compose logs --tail=100 service
          echo "--- NGINX LOGS ---"
          docker compose logs --tail=100 nginx
